dataset:
  name: "hiring/resume"
  base_path: "./data/extract-bench"
  split_seed: 42
  train_ratio: 0.10
  val_ratio: 0.10

budget:
  max_iterations: 3
  max_cost_dollars: 0.0

vision_model: "meta-llama/llama-3.2-11b-vision-instruct:free"

models:
  extractor:    "google/gemma-4-31b-it:free"
  critic:       "google/gemma-4-31b-it:free"
  mutator:      "google/gemma-4-31b-it:free"
  github_model: "gpt-4o-mini"

seed_prompt: |
  Extract the structured information from the provided document.
  Return ONLY valid JSON matching the exact schema. Do not include markdown formatting like ```json.